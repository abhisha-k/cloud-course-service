apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-course-abhisha
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-course-abhisha
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-course-abhisha
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/abhisha-course:latest
        imagePullPolicy: Always
        name: app-course-abhisha
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-course-abhisha
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-course-abhisha
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-course-abhisha
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: students-app
    alb.ingress.kubernetes.io/healthcheck-path: /health



spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /abhisha-student
          pathType: Prefix
          backend:
            service:
              name: service-course-abhisha
              port:
                number: 3001